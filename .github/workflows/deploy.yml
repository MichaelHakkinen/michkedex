name: Deploy MichKedex to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Only run one deployment at a time; cancel in-progress if a new push comes in
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: MichKedex/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: MichKedex

      - name: Build with Vite
        run: npm run build
        working-directory: MichKedex

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: MichKedex/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
